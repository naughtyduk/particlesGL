<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      particlesGL Audio Visualizer - Real-time Music Particle Effects -
      NaughtyDuk©
    </title>
    <link rel="icon" href="/assets/favicon.ico" />
    <meta
      name="description"
      content="particlesGL Audio Visualizer - Real-time particle effects that react to music with circular pulsing patterns. Built with love by NaughtyDuk©"
    />
    <meta
      name="keywords"
      content="particlesGL, webGL, particles, interactive, audio visualizer, music, three.js, NaughtyDuk©"
    />
    <meta name="author" content="NaughtyDuk©" />
    <style>
      body {
        margin: 0;
        background-color: #111111;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        overflow: hidden;
      }

      .visualizer-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #circle-target {
        width: 1vw;
        height: 1vw;
        position: relative;
        opacity: 1;
        padding: 30vw 50vw;
      }

      .track-details {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 0;
        justify-content: center;
      }

      .track-title {
        font-size: 14px;
        font-weight: 500;
        color: #fafafa;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-left: -5px;
        margin-top: 5px;
        flex: 1;
        min-width: 0;
      }

      .title-section {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .player-main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .progress-section {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-left: 4px;
      }

      /* ShadCN Dark Audio Controls */
      .audio-controls {
        position: fixed;
        bottom: 2rem;
        left: 1rem;
        right: 1rem;
        background: rgb(9 9 11 / 20%);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 16px;
        z-index: 1000;
        border: 0.5px solid #1e1e20;
        margin: 0 auto;
        max-width: 640px;
      }

      .play-button {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: transparent;
        border: 1px solid #27272a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        flex-shrink: 0;
      }

      .play-button:hover {
        background: #27272a;
        transform: scale(1.05);
      }

      .play-button svg {
        width: 18px;
        height: 18px;
        fill: #fafafa;
      }

      .progress-container {
        flex: 1;
        height: 4px;
        background: #3f3f46;
        border-radius: 2px;
        cursor: pointer;
        position: relative;
      }

      .progress-bar {
        position: relative;
        height: 100%;
        background: #fafafa;
        border-radius: 2px;
        width: 0%;
        transition: width 0.1s ease;
      }

      .progress-bar::after {
        content: "";
        position: absolute;
        right: 0;
        top: 50%;
        transform: translate(50%, -50%);
        width: 16px;
        height: 4px;
        background-color: #fafafa;
        border-radius: 999px;
        transition: transform 0.2s ease;
      }

      .volume-container {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .volume-slider {
        width: 80px;
        height: 4px;
        background: #27272a;
        border-radius: 2px;
        cursor: pointer;
        position: relative;
      }

      .volume-bar {
        height: 100%;
        background: #fafafa;
        border-radius: 2px;
        width: 70%;
      }

      .time-display {
        font-size: 12px;
        color: #a1a1aa;
        font-weight: 500;
        text-align: center;
      }

      .lil-gui {
        --focus-color: #fafafa;
        --number-color: #ff3333;
      }

      .lil-gui.autoPlace {
        z-index: 10000;
      }
    </style>
  </head>
  <body>
    <div class="visualizer-container">
      <div id="circle-target"></div>
    </div>

    <!-- Audio Controls -->
    <div class="audio-controls">
      <button class="play-button" id="playButton">
        <svg id="playIcon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>

      <div class="player-main">
        <div class="title-section">
          <div class="track-title">Swoon - Adrenaline</div>
          <div class="volume-slider" id="volumeSlider">
            <div class="volume-bar" id="volumeBar"></div>
          </div>
        </div>
        <div class="progress-section">
          <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
        </div>
      </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="audioElement" preload="auto">
      <source src="../assets/swoon-adrenaline.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>

    <!-- particlesGL Library -->
    <script src="/scripts/particlesGL.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        let audioContext;
        let analyser;
        let dataArray;
        let particleEffect;
        let isPlaying = false;
        let isScrubbing = false;

        const audioElement = document.getElementById("audioElement");
        const playButton = document.getElementById("playButton");
        const playIcon = document.getElementById("playIcon");
        const pauseIcon = document.getElementById("pauseIcon");
        const progressContainer = document.getElementById("progressContainer");
        const progressBar = document.getElementById("progressBar");
        const timeDisplay = document.getElementById("timeDisplay");
        const volumeSlider = document.getElementById("volumeSlider");
        const volumeBar = document.getElementById("volumeBar");

        // Create SINGLE circle geometry
        function createCircleGeometry(radius = 0.3, segments = 128) {
          const positions = [];
          const angleStep = (Math.PI * 2) / segments;

          for (let i = 0; i < segments; i++) {
            const angle = i * angleStep;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            positions.push(x, y, 0);
          }

          return positions;
        }

        // Initialize particlesGL with single circle
        if (typeof particlesGL !== "undefined") {
          const circleGeometry = createCircleGeometry(0.4, 128);

          particleEffect = particlesGL({
            target: "#circle-target",
            geometry: circleGeometry,
            character: "●",
            particleSize: 0.06,
            particleColor: "#ff3333",
            tilt: false,
            tiltFactor: 0,
            tiltSpeed: 0,
            displaceStrength: 0.1,
            displaceRadius: 0.1,
            velocityInfluence: 0.5,
            returnSpeed: 0.05,
          });

          console.log(
            "particlesGL initialized with",
            circleGeometry.length / 3,
            "particles"
          );
        }

        // Start the audio analysis loop immediately
        analyzeAudio();

        // Initialize Web Audio API
        async function initAudio() {
          try {
            audioContext = new (window.AudioContext ||
              window.webkitAudioContext)();
            const source = audioContext.createMediaElementSource(audioElement);
            analyser = audioContext.createAnalyser();

            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            source.connect(analyser);
            analyser.connect(audioContext.destination);

            // Start audio analysis loop
            analyzeAudio();
          } catch (error) {
            console.error("Error initializing audio:", error);
          }
        }

        // Audio analysis and particle updates
        function analyzeAudio() {
          requestAnimationFrame(analyzeAudio);

          if (!analyser || !particleEffect) {
            return;
          }

          analyser.getByteFrequencyData(dataArray);

          // Calculate frequency bands
          const bassRange = dataArray.slice(0, 10);
          const midRange = dataArray.slice(10, 50);
          const highRange = dataArray.slice(50, 128);

          const bassAvg =
            bassRange.reduce((a, b) => a + b, 0) / bassRange.length;
          const midAvg = midRange.reduce((a, b) => a + b, 0) / midRange.length;
          const highAvg =
            highRange.reduce((a, b) => a + b, 0) / highRange.length;
          const overallAvg =
            dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

          // Normalize audio levels
          const bassNorm = bassAvg / 255;
          const midNorm = midAvg / 255;
          const highNorm = highAvg / 255;
          const overallNorm = overallAvg / 255;

          // Create outward pulsing effect - particles shoot out from circle
          const pulseIntensity = Math.max(bassNorm, midNorm, highNorm);

          // Particle size grows with bass
          const baseSize = 0.04;
          const maxSize = 0.12;
          const newSize = baseSize + bassNorm * (maxSize - baseSize);

          // Displacement strength - how forcefully particles are pushed outward
          const baseDisplacement = 0.1;
          const maxDisplacement = 1.5;
          const newDisplacement =
            baseDisplacement +
            pulseIntensity * (maxDisplacement - baseDisplacement);

          // Displacement radius - how far from center the effect reaches
          const baseRadius = 0.5;
          const maxRadius = 1.5;
          const newRadius = baseRadius + overallNorm * (maxRadius - baseRadius);

          // Color changes with frequency
          const redIntensity = Math.floor(200 + bassNorm * 55);
          const greenIntensity = Math.floor(midNorm * 100);
          const blueIntensity = Math.floor(highNorm * 80);
          const newColor = `rgb(${redIntensity}, ${greenIntensity}, ${blueIntensity})`;

          // Velocity for smooth outward movement
          const baseVelocity = 0.3;
          const maxVelocity = 1.5;
          const newVelocity =
            baseVelocity + pulseIntensity * (maxVelocity - baseVelocity);

          // Return speed - how quickly particles come back to circle
          const baseReturn = 0.02;
          const maxReturn = 0.1;
          const newReturn =
            baseReturn + (1 - pulseIntensity) * (maxReturn - baseReturn);

          // Update particle effect
          particleEffect.updateOptions({
            particleSize: newSize,
            displaceStrength: newDisplacement,
            displaceRadius: newRadius,
            particleColor: newColor,
            velocityInfluence: newVelocity,
            returnSpeed: newReturn,
          });

          // Debug audio levels occasionally
          if (Math.random() < 0.005) {
            console.log("Audio visualizer:", {
              bass: bassNorm.toFixed(2),
              mid: midNorm.toFixed(2),
              high: highNorm.toFixed(2),
              pulse: pulseIntensity.toFixed(2),
              displacement: newDisplacement.toFixed(2),
              radius: newRadius.toFixed(2),
            });
          }
        }

        // Play/Pause functionality
        playButton.addEventListener("click", async () => {
          if (!audioContext) {
            await initAudio();
          }

          if (audioContext.state === "suspended") {
            await audioContext.resume();
          }

          if (isPlaying) {
            audioElement.pause();
            playIcon.style.display = "block";
            pauseIcon.style.display = "none";
            isPlaying = false;
          } else {
            audioElement.play();
            playIcon.style.display = "none";
            pauseIcon.style.display = "block";
            isPlaying = true;
          }
        });

        // Progress bar functionality
        audioElement.addEventListener("timeupdate", () => {
          if (isScrubbing) return; // Don't update UI while scrubbing

          const progress =
            (audioElement.currentTime / audioElement.duration) * 100;
          progressBar.style.width = `${progress}%`;

          const currentTime = formatTime(audioElement.currentTime);
          const duration = formatTime(audioElement.duration);
          timeDisplay.textContent = `${currentTime} / ${duration}`;
        });

        const seek = (e) => {
          const rect = progressContainer.getBoundingClientRect();
          const clientX = e.clientX ?? e.touches[0].clientX;
          const progress = (clientX - rect.left) / rect.width;
          const clampedProgress = Math.max(0, Math.min(1, progress));

          progressBar.style.width = `${clampedProgress * 100}%`;
          audioElement.currentTime = clampedProgress * audioElement.duration;
        };

        progressContainer.addEventListener("mousedown", (e) => {
          isScrubbing = true;
          seek(e);

          const onMouseMove = (moveEvent) => {
            if (isScrubbing) {
              seek(moveEvent);
            }
          };

          const onMouseUp = () => {
            isScrubbing = false;
            document.removeEventListener("mousemove", onMouseMove);
            document.removeEventListener("mouseup", onMouseUp);
          };

          document.addEventListener("mousemove", onMouseMove);
          document.addEventListener("mouseup", onMouseUp);
        });

        progressContainer.addEventListener(
          "touchstart",
          (e) => {
            isScrubbing = true;
            seek(e);

            const onTouchMove = (moveEvent) => {
              if (isScrubbing) {
                seek(moveEvent);
              }
            };

            const onTouchEnd = () => {
              isScrubbing = false;
              document.removeEventListener("touchmove", onTouchMove);
              document.removeEventListener("touchend", onTouchEnd);
            };

            document.addEventListener("touchmove", onTouchMove);
            document.addEventListener("touchend", onTouchEnd);
          },
          { passive: true }
        );

        // Volume control
        volumeSlider.addEventListener("click", (e) => {
          const rect = volumeSlider.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const volume = clickX / rect.width;
          audioElement.volume = Math.max(0, Math.min(1, volume));
          volumeBar.style.width = volume * 100 + "%";
        });

        // Format time helper
        function formatTime(seconds) {
          if (isNaN(seconds)) return "0:00";
          const mins = Math.floor(seconds / 60);
          const secs = Math.floor(seconds % 60);
          return `${mins}:${secs.toString().padStart(2, "0")}`;
        }

        // GUI Controls
        if (typeof lil !== "undefined" && particleEffect) {
          const gui = new lil.GUI();
          const folder = gui.addFolder("Audio Visualizer");
          const controls = particleEffect.options;

          folder
            .add(controls, "particleSize", 0.005, 0.1, 0.001)
            .name("Base Size")
            .onChange((value) =>
              particleEffect.updateOptions({ particleSize: value })
            );
          folder
            .add(controls, "displaceStrength", 0, 2, 0.1)
            .name("Pulse Strength")
            .onChange((value) =>
              particleEffect.updateOptions({ displaceStrength: value })
            );
          folder
            .add(controls, "displaceRadius", 0.01, 0.5, 0.01)
            .name("Pulse Radius")
            .onChange((value) =>
              particleEffect.updateOptions({ displaceRadius: value })
            );
          folder
            .add(controls, "returnSpeed", 0.01, 0.2, 0.01)
            .name("Return Speed")
            .onChange((value) =>
              particleEffect.updateOptions({ returnSpeed: value })
            );

          const colorOptions = { particleColor: controls.particleColor };
          folder
            .addColor(colorOptions, "particleColor")
            .name("Base Color")
            .onChange((value) => {
              particleEffect.updateOptions({ particleColor: value });
            });

          folder.close();
        }
      });
    </script>
  </body>
</html>
